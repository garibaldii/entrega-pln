<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot PLN</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <h1>🤖 Chatbot</h1>
        </header>

        <div id="chat"></div>

        <div class="input-area">

            <button class="mic" onclick="startVoice()">🎤</button>

            <input type="text" id="input" placeholder="Digite sua mensagem..." />

            <button class="send" onclick="sendMessage()">➤</button>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
